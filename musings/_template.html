<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title><!-- title here --></title>
  <link rel="stylesheet" href="../style.css" />
  <link rel="stylesheet" href="../assets/epoch-fonts.css" />
</head>
<body>

  <header>
    <p class="nav-back"><a href="../">&larr; musings</a></p>
    <h1 class="title"><!-- title --></h1>
    <p class="subtitle"><!-- subtitle, or delete --></p>
    <p class="date"><!-- YYYY-MM — human date only on piece pages (unix swap is archive-only) -->2026-03</p>
  </header>

  <hr class="divider" />

  <!-- GIF slot — remove .hidden and fill src to activate -->
  <div class="gif-block hidden">
    <img src="" alt="" class="gif" />
    <p class="gif-caption"></p>
  </div>

  <main class="article">

    <!-- write directly in html using your stylesheet's tags -->
    <!-- h2 = section heading, h3 = subheading (centered bold) -->
    <!-- p, ul/li, blockquote, code all work as expected -->
    <!-- Optional sources: no “Works cited” heading — use section.sources-footnote + same citation style as body -->

    <p></p>

  </main>

  <footer>
    <hr class="divider" />
    <div class="footer-note footer-epoch">
      <span id="epoch-ticker" class="epoch-ticker" role="group" aria-label="Unix time and estimated chain heights"></span>
    </div>
  </footer>

  <script defer src="../assets/day-bg.js"></script>
  <script defer src="../assets/epoch.js"></script>
  <script defer src="../assets/epoch-delim-picker.js"></script>
</body>
</html>
