# Render Blueprint: https://render.com/docs/blueprint-spec
# Free web service (sleeps after ~15 min idle; first request may take ~30s).
services:
  - type: web
    name: wock9000-wti-intraday
    runtime: python
    plan: free
    rootDir: apps/wti-intraday
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --bind 0.0.0.0:$PORT app:server
    healthCheckPath: /
